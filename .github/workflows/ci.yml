# runs the unit tests on every push and PR so the badge stays honest.
# pinned to 3.11 to match the Dockerfile — the requirements wheels are built
# for that version.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # pytest + httpx aren't runtime deps, but the test suite needs them
          # (TestClient is backed by httpx).
          pip install -r requirements.txt pytest httpx

      - name: Run tests
        run: pytest tests/ -v
